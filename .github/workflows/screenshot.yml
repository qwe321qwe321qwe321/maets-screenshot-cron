name: Steam Homepage Screenshot

on:
  schedule:
    - cron: "0 1,13 * * *"
  workflow_dispatch:
    inputs:
      channel_ids:
        description: "Comma-separated Discord channel IDs (leave empty to query D1)"
        required: false
        type: string

jobs:
  screenshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - run: npx playwright install chromium --with-deps

      - run: node screenshot.js
        env:
          DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
          CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
          CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
          CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
          CHANNEL_IDS: ${{ inputs.channel_ids }}
          WEBSHARE_API_KEY: ${{ secrets.WEBSHARE_API_KEY }}

